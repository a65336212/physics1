<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>等量正点电荷：电子往复运动 | 手机适配 | 动态受力箭头</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        .sim-card {
            background: rgba(30, 40, 50, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 1.5rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 100%;
            width: 100%;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            background: #fef9e8;
            cursor: pointer;
            width: 100%;
            height: auto;
            aspect-ratio: 800 / 450;  /* 保持画布比例 */
            max-width: 800px;
        }

        .control-panel {
            margin-top: 1rem;
            background: #1e2a32c9;
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            backdrop-filter: blur(4px);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #0f1a1f70;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            backdrop-filter: blur(4px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .ctrl-group label {
            font-weight: 600;
            color: #eef4ff;
            letter-spacing: 0.5px;
            font-size: 0.75rem;
        }

        input[type="range"] {
            width: 120px;
            height: 4px;
            -webkit-appearance: none;
            background: #3a5a6e;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffb347;
            cursor: pointer;
            box-shadow: 0 0 4px #ffcc88;
            border: none;
        }

        .value-badge {
            background: #00000066;
            padding: 0.2rem 0.5rem;
            border-radius: 2rem;
            font-family: monospace;
            font-weight: bold;
            color: #ffdfb8;
            font-size: 0.75rem;
            min-width: 45px;
            text-align: center;
        }

        button {
            background: #2c4c6c;
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        button:hover {
            background: #3e6a8c;
            transform: scale(0.97);
            box-shadow: 0 1px 3px black;
        }

        button:active {
            background: #1f3e58;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 0.8rem;
            justify-content: center;
            font-size: 0.8rem;
            background: #0f1a1fa0;
            border-radius: 1.2rem;
            padding: 0.5rem 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            color: #c0e0ff;
            text-align: center;
        }

        .stats div {
            background: #00000040;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
        }

        .stats span {
            color: #ffd966;
            font-weight: bold;
            font-size: 1rem;
            margin-left: 0.2rem;
        }

        .title {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #ffe3b3;
            text-shadow: 0 2px 3px black;
            letter-spacing: 1px;
        }

        .footnote {
            font-size: 0.6rem;
            text-align: center;
            color: #9bb7c9;
            margin-top: 8px;
        }

        /* 手机竖屏时调整按钮组间距 */
        @media (max-width: 600px) {
            .control-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .ctrl-group {
                justify-content: space-between;
                width: 100%;
            }
            .ctrl-group label {
                font-size: 0.7rem;
            }
            button {
                font-size: 0.7rem;
                padding: 0.25rem 0.6rem;
            }
            .stats {
                font-size: 0.7rem;
            }
            .stats span {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="sim-card">
    <div class="title">
        ⚡ 等量正点电荷 · 中垂线上电子高速往复运动 ⚛️
    </div>
    <canvas id="simCanvas" width="800" height="450" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/450"></canvas>

    <div class="control-panel">
        <div class="ctrl-group">
            <label>📌 初始 Y₀</label>
            <input type="range" id="initYSlider" min="-210" max="210" step="1" value="150">
            <span id="initYValue" class="value-badge">150</span>
            <button id="resetBtn">🔄 重置</button>
        </div>
        <div class="ctrl-group">
            <button id="playPauseBtn">▶️ 开始运动</button>
            <button id="clearTrailBtn">🧹 清除轨迹</button>
            <button id="toggleFieldBtn">⚡ 隐藏电场线</button>
        </div>
    </div>

    <div class="stats">
        <div>⚡ 速度 v = <span id="velY">0.00</span> &nbsp; px/s</div>
        <div>💨 加速度 a = <span id="accY">0.00</span> &nbsp; px/s²</div>
    </div>
    <div class="footnote">
        ※ 两个固定正电荷 (+Q) 位于 (-100,0) 和 (100,0) | 电子沿中垂线运动 | 周期 ≈ 8 秒 | 箭头长度 ∝ 回复力大小
    </div>
</div>

<script>
    (function(){
        // ---------- 物理参数 (周期约8秒，运动明显) ----------
        const COULOMB_K = 30000.0;     // 库仑常数
        const CHARGE_Q = 1.0;
        const ELECTRON_CHARGE = 1.0;
        const MASS_ELECTRON = 0.1;
        const HALF_DIST = 100.0;

        // 状态变量
        let y = 150.0;
        let vy = 0.0;
        let simTime = 0.0;
        let running = false;
        let animationId = null;

        // 轨迹记录
        let trailPoints = [];
        const MAX_TRAIL = 180;

        // 电场线显示开关
        let showFieldLines = true;

        // DOM 元素
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const initYSlider = document.getElementById('initYSlider');
        const initYValue = document.getElementById('initYValue');
        const resetBtn = document.getElementById('resetBtn');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const clearTrailBtn = document.getElementById('clearTrailBtn');
        const toggleFieldBtn = document.getElementById('toggleFieldBtn');

        const spanVelY = document.getElementById('velY');
        const spanAccY = document.getElementById('accY');

        // 画布中心坐标（固定物理尺寸，但CSS缩放不影响内部坐标）
        const centerX = 400;
        const centerY = 225;

        // ---------- 物理计算 ----------
        function computeForce(yPos) {
            const denom = Math.pow(HALF_DIST * HALF_DIST + yPos * yPos, 1.5);
            if (denom < 1e-6) return 0.0;
            return - 2.0 * COULOMB_K * CHARGE_Q * ELECTRON_CHARGE * yPos / denom;
        }
        
        function computeAcceleration(yPos) {
            return computeForce(yPos) / MASS_ELECTRON;
        }
        
        function updateStats() {
            const acc = computeAcceleration(y);
            spanVelY.innerText = vy.toFixed(2);
            spanAccY.innerText = acc.toFixed(2);
        }
        
        // Velocity Verlet 积分
        function verletStep(dt) {
            if (dt > 0.005) dt = 0.005;
            const a_curr = computeAcceleration(y);
            const y_new = y + vy * dt + 0.5 * a_curr * dt * dt;
            const a_new = computeAcceleration(y_new);
            const vy_new = vy + 0.5 * (a_curr + a_new) * dt;
            y = y_new;
            vy = vy_new;
            simTime += dt;
            if (Math.abs(y) > 550) {
                y = y > 0 ? 500 : -500;
                vy = vy * 0.98;
            }
        }
        
        function recordTrail() {
            trailPoints.push(y);
            if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
        }
        
        function clearTrail() {
            trailPoints = [];
            recordTrail();
        }
        
        function resetSimulation() {
            if (running) {
                running = false;
                if (animationId) cancelAnimationFrame(animationId);
                playPauseBtn.innerHTML = '▶️ 开始运动';
            }
            const initVal = parseFloat(initYSlider.value);
            y = initVal;
            vy = 0.0;
            simTime = 0.0;
            trailPoints = [];
            recordTrail();
            updateStats();
            drawCanvas();
        }
        
        function sliderChangeHandler() {
            const val = parseFloat(initYSlider.value);
            initYValue.innerText = val.toFixed(1);
            if (!running) {
                y = val;
                vy = 0.0;
                trailPoints = [];
                recordTrail();
                updateStats();
                drawCanvas();
            }
        }
        
        // ---------- 严谨电场线绘制 (基于电场方向数值积分) ----------
        function electricFieldAt(px, py) {
            const q1x = -HALF_DIST, q1y = 0;
            const q2x = HALF_DIST, q2y = 0;
            const r1x = px - q1x, r1y = py - q1y;
            const r2x = px - q2x, r2y = py - q2y;
            const r1 = Math.hypot(r1x, r1y);
            const r2 = Math.hypot(r2x, r2y);
            if (r1 < 1e-3 || r2 < 1e-3) return { Ex: 0, Ey: 0 };
            const E1mag = COULOMB_K * CHARGE_Q / (r1 * r1);
            const E2mag = COULOMB_K * CHARGE_Q / (r2 * r2);
            const Ex = E1mag * (r1x / r1) + E2mag * (r2x / r2);
            const Ey = E1mag * (r1y / r1) + E2mag * (r2y / r2);
            return { Ex, Ey };
        }
        
        function traceFieldLine(startX, startY, stepSize = 4.0, maxSteps = 120) {
            const points = [[startX, startY]];
            let x = startX, y = startY;
            for (let i = 0; i < maxSteps; i++) {
                let { Ex, Ey } = electricFieldAt(x, y);
                let len = Math.hypot(Ex, Ey);
                if (len < 1e-6) break;
                let dx = Ex / len * stepSize;
                let dy = Ey / len * stepSize;
                let nx = x + dx, ny = y + dy;
                if (Math.abs(nx) > 400 || Math.abs(ny) > 350) break;
                points.push([nx, ny]);
                x = nx; y = ny;
            }
            x = startX; y = startY;
            for (let i = 0; i < maxSteps; i++) {
                let { Ex, Ey } = electricFieldAt(x, y);
                let len = Math.hypot(Ex, Ey);
                if (len < 1e-6) break;
                let dx = -Ex / len * stepSize;
                let dy = -Ey / len * stepSize;
                let nx = x + dx, ny = y + dy;
                if (Math.abs(nx) > 400 || Math.abs(ny) > 350) break;
                points.unshift([nx, ny]);
                x = nx; y = ny;
            }
            return points;
        }
        
        function drawFieldLines() {
            if (!showFieldLines) return;
            ctx.save();
            ctx.globalAlpha = 0.65;
            ctx.lineWidth = 1.4;
            ctx.strokeStyle = "#4c9ece";
            ctx.fillStyle = "#3a8cbb";
            ctx.shadowBlur = 0;
            ctx.setLineDash([5, 4]);
            
            const seedAngles = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330].map(d => d * Math.PI/180);
            const radius = 22;
            const leftChargeX = -HALF_DIST;
            const rightChargeX = HALF_DIST;
            const chargeY = 0;
            
            const seedPoints = [];
            for (let ang of seedAngles) {
                let sx = leftChargeX + radius * Math.cos(ang);
                let sy = chargeY + radius * Math.sin(ang);
                seedPoints.push([sx, sy]);
            }
            for (let ang of seedAngles) {
                let sx = rightChargeX + radius * Math.cos(ang);
                let sy = chargeY + radius * Math.sin(ang);
                seedPoints.push([sx, sy]);
            }
            for (let yOff = -120; yOff <= 120; yOff += 40) {
                if (Math.abs(yOff) < 30) continue;
                seedPoints.push([0, yOff]);
            }
            
            const uniqueSeeds = [];
            for (let sp of seedPoints) {
                let dup = false;
                for (let existing of uniqueSeeds) {
                    if (Math.hypot(sp[0]-existing[0], sp[1]-existing[1]) < 8) {
                        dup = true; break;
                    }
                }
                if (!dup) uniqueSeeds.push(sp);
            }
            
            for (let seed of uniqueSeeds) {
                const points = traceFieldLine(seed[0], seed[1], 3.8, 100);
                if (points.length < 5) continue;
                ctx.beginPath();
                let first = true;
                for (let p of points) {
                    const screenX = centerX + p[0];
                    const screenY = centerY - p[1];
                    if (screenX < 0 || screenX > canvas.width || screenY < 0 || screenY > canvas.height) {
                        first = true;
                        continue;
                    }
                    if (first) {
                        ctx.moveTo(screenX, screenY);
                        first = false;
                    } else {
                        ctx.lineTo(screenX, screenY);
                    }
                }
                ctx.stroke();
            }
            
            const arrowSeeds = [
                [-40, 60], [40, 60], [-70, 40], [70, 40], [0, 90], [0, -90],
                [-90, 0], [90, 0], [-30, 120], [30, 120]
            ];
            ctx.setLineDash([]);
            ctx.lineWidth = 1.2;
            ctx.fillStyle = "#52b0e0";
            for (let [x0, y0] of arrowSeeds) {
                let { Ex, Ey } = electricFieldAt(x0, y0);
                let len = Math.hypot(Ex, Ey);
                if (len < 1e-4) continue;
                let dx = Ex / len * 12;
                let dy = Ey / len * 12;
                let x1 = x0 + dx, y1 = y0 + dy;
                const sx0 = centerX + x0, sy0 = centerY - y0;
                const sx1 = centerX + x1, sy1 = centerY - y1;
                if (sx0<0||sx0>canvas.width||sy0<0||sy0>canvas.height) continue;
                if (sx1<0||sx1>canvas.width||sy1<0||sy1>canvas.height) continue;
                ctx.beginPath();
                ctx.moveTo(sx0, sy0);
                ctx.lineTo(sx1, sy1);
                ctx.stroke();
                const angle = Math.atan2(sy1 - sy0, sx1 - sx0);
                const arrX = sx1, arrY = sy1;
                const a1 = angle + Math.PI * 0.7;
                const a2 = angle - Math.PI * 0.7;
                const tipLen = 6;
                ctx.beginPath();
                ctx.moveTo(arrX, arrY);
                ctx.lineTo(arrX + tipLen * Math.cos(a1), arrY + tipLen * Math.sin(a1));
                ctx.lineTo(arrX + tipLen * Math.cos(a2), arrY + tipLen * Math.sin(a2));
                ctx.fill();
            }
            ctx.restore();
        }
        
        // ---------- 主绘图函数 ----------
        function drawCanvas() {
            if (!ctx) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景网格
            ctx.save();
            ctx.strokeStyle = "#cddde9";
            ctx.lineWidth = 0.6;
            for (let i = -300; i <= 300; i += 30) {
                const screenY = centerY - i;
                if (screenY >= 0 && screenY <= canvas.height) {
                    ctx.beginPath();
                    ctx.moveTo(0, screenY);
                    ctx.lineTo(canvas.width, screenY);
                    ctx.stroke();
                }
                const screenX = centerX + i;
                if (screenX >= 0 && screenX <= canvas.width) {
                    ctx.beginPath();
                    ctx.moveTo(screenX, 0);
                    ctx.lineTo(screenX, canvas.height);
                    ctx.stroke();
                }
            }
            // 坐标轴
            ctx.beginPath();
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#5a7a92";
            ctx.moveTo(0, centerY);
            ctx.lineTo(canvas.width, centerY);
            ctx.moveTo(centerX, 0);
            ctx.lineTo(centerX, canvas.height);
            ctx.stroke();
            ctx.fillStyle = "#2c4a62";
            ctx.font = "bold 16px 'Segoe UI'";
            ctx.fillText("O", centerX + 5, centerY - 5);
            
            // 电场线
            drawFieldLines();
            
            // 电荷
            const x_left = centerX - HALF_DIST;
            const x_right = centerX + HALF_DIST;
            const y_charge = centerY;
            ctx.beginPath();
            ctx.arc(x_left, y_charge, 18, 0, 2*Math.PI);
            ctx.fillStyle = "#e34d4c";
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 22px 'Segoe UI'";
            ctx.fillText("+", x_left-7, y_charge+8);
            ctx.beginPath();
            ctx.arc(x_right, y_charge, 18, 0, 2*Math.PI);
            ctx.fillStyle = "#e34d4c";
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.fillText("+", x_right-7, y_charge+8);
            ctx.fillStyle = "#ffe0b5";
            ctx.font = "12px monospace";
            ctx.fillText("+Q", x_left-10, y_charge-12);
            ctx.fillText("+Q", x_right+2, y_charge-12);
            
            // 中垂线虚线
            ctx.beginPath();
            ctx.setLineDash([8, 8]);
            ctx.strokeStyle = "#8ba0b0";
            ctx.lineWidth = 1.5;
            ctx.moveTo(centerX, 0);
            ctx.lineTo(centerX, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 轨迹
            if (trailPoints.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = "#b385ff";
                ctx.lineWidth = 2.2;
                for (let i = 0; i < trailPoints.length; i++) {
                    const py = trailPoints[i];
                    const screenY_trail = centerY - py;
                    if (i === 0) ctx.moveTo(centerX, screenY_trail);
                    else ctx.lineTo(centerX, screenY_trail);
                }
                ctx.stroke();
                for (let i = 0; i < trailPoints.length; i+=2) {
                    const py = trailPoints[i];
                    const screenY_trail = centerY - py;
                    ctx.beginPath();
                    ctx.fillStyle = "#aa88ffaa";
                    ctx.arc(centerX, screenY_trail, 2.8, 0, 2*Math.PI);
                    ctx.fill();
                }
            }
            
            // 电子
            const electronY_screen = centerY - y;
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ffaa66";
            ctx.beginPath();
            ctx.arc(centerX, electronY_screen, 13, 0, 2*Math.PI);
            ctx.fillStyle = "#ff7b4a";
            ctx.fill();
            ctx.fillStyle = "#2b1e0e";
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.fillText("e⁻", centerX-6, electronY_screen+5);
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(centerX-2, electronY_screen-2, 3.5, 0, 2*Math.PI);
            ctx.fillStyle = "#fff6cf";
            ctx.fill();
            
            // ---------- 受力箭头：长度正比于回复力大小 ----------
            const forceVal = computeForce(y);
            if (Math.abs(forceVal) > 0.1 && Math.abs(y) > 1) {
                // 力的大小范围：在 y=150 时力约 6000~8000，我们映射到 12~40 像素
                let forceMagnitude = Math.abs(forceVal);
                // 最大参考力取在 y=150 时的值（大约 8000），最小 100
                let maxForceRef = 9000;
                let minLen = 12, maxLen = 42;
                let arrowLen = minLen + (forceMagnitude / maxForceRef) * (maxLen - minLen);
                arrowLen = Math.min(maxLen, Math.max(minLen, arrowLen));
                const arrowDir = forceVal > 0 ? 1 : -1;  // 力方向: 正表示向上，负表示向下
                const arrowBaseY = electronY_screen;
                const arrowTipY = arrowBaseY - arrowDir * arrowLen;
                ctx.beginPath();
                ctx.moveTo(centerX, arrowBaseY);
                ctx.lineTo(centerX, arrowTipY);
                ctx.lineWidth = 2.5;
                ctx.strokeStyle = "#44c9ff";
                ctx.stroke();
                // 箭头三角
                ctx.beginPath();
                const headX = centerX;
                const headY = arrowTipY;
                const angle = arrowDir === -1 ? Math.PI/2 : -Math.PI/2;
                const tipSize = 7;
                ctx.moveTo(headX, headY);
                ctx.lineTo(headX - tipSize, headY + (arrowDir === -1 ? -tipSize : tipSize));
                ctx.lineTo(headX + tipSize, headY + (arrowDir === -1 ? -tipSize : tipSize));
                ctx.fillStyle = "#44c9ffcc";
                ctx.fill();
            }
            
            // 简洁显示位移标尺
            ctx.beginPath();
            ctx.setLineDash([4, 6]);
            ctx.moveTo(centerX, electronY_screen);
            ctx.lineTo(centerX+26, electronY_screen);
            ctx.stroke();
            ctx.fillStyle = "#3a6b8f";
            ctx.fillText(`${y.toFixed(1)}`, centerX+28, electronY_screen+3);
            ctx.setLineDash([]);
            ctx.restore();
        }
        
        // ---------- 动画循环 ----------
        let lastTimestamp = null;
        let timeAccumulator = 0;
        const BASE_DT = 0.002;
        
        function animate(currentTimeMs) {
            if (!running) {
                animationId = null;
                return;
            }
            if (!lastTimestamp) {
                lastTimestamp = currentTimeMs;
                animationId = requestAnimationFrame(animate);
                return;
            }
            let deltaMs = Math.min(100, currentTimeMs - lastTimestamp);
            if (deltaMs <= 0) {
                lastTimestamp = currentTimeMs;
                animationId = requestAnimationFrame(animate);
                return;
            }
            let deltaSec = deltaMs / 1000.0;
            lastTimestamp = currentTimeMs;
            
            timeAccumulator += deltaSec;
            let stepCount = 0;
            while (timeAccumulator >= BASE_DT && stepCount < 12) {
                verletStep(BASE_DT);
                timeAccumulator -= BASE_DT;
                stepCount++;
                recordTrail();
            }
            updateStats();
            drawCanvas();
            animationId = requestAnimationFrame(animate);
        }
        
        function startSimulation() {
            if (running) return;
            running = true;
            lastTimestamp = null;
            timeAccumulator = 0;
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animate);
            playPauseBtn.innerHTML = '⏸️ 暂停运动';
        }
        
        function pauseSimulation() {
            if (!running) return;
            running = false;
            if (animationId) cancelAnimationFrame(animationId);
            playPauseBtn.innerHTML = '▶️ 开始运动';
            drawCanvas();
        }
        
        function toggleSimulation() {
            if (running) pauseSimulation();
            else startSimulation();
        }
        
        function fullReset() {
            const newY = parseFloat(initYSlider.value);
            y = newY;
            vy = 0.0;
            simTime = 0.0;
            trailPoints = [];
            recordTrail();
            updateStats();
            drawCanvas();
            if (running) {
                running = false;
                if (animationId) cancelAnimationFrame(animationId);
                playPauseBtn.innerHTML = '▶️ 开始运动';
            }
        }
        
        function handleClearTrail() {
            trailPoints = [];
            recordTrail();
            drawCanvas();
        }
        
        function toggleFieldLines() {
            showFieldLines = !showFieldLines;
            toggleFieldBtn.innerHTML = showFieldLines ? "⚡ 隐藏电场线" : "⚡ 显示电场线";
            drawCanvas();
        }
        
        // 事件绑定
        function bindEvents() {
            initYSlider.addEventListener('input', sliderChangeHandler);
            resetBtn.addEventListener('click', fullReset);
            playPauseBtn.addEventListener('click', toggleSimulation);
            clearTrailBtn.addEventListener('click', handleClearTrail);
            toggleFieldBtn.addEventListener('click', toggleFieldLines);
        }
        
        function init() {
            const initVal = parseFloat(initYSlider.value);
            y = initVal;
            vy = 0.0;
            trailPoints = [];
            recordTrail();
            updateStats();
            drawCanvas();
            bindEvents();
            running = false;
            playPauseBtn.innerHTML = '▶️ 开始运动';
            showFieldLines = true;
            toggleFieldBtn.innerHTML = "⚡ 隐藏电场线";
        }
        
        init();
    })();
</script>
</body>
</html>
